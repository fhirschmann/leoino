<svg xmlns="http://www.w3.org/2000/svg" width="420" height="64" viewBox="0 0 420 64" role="img" aria-label="Launch the live web demo">
	<defs>
		<linearGradient id="fill" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0" stop-color="#0a1424"/>
			<stop offset="1" stop-color="#05070d"/>
		</linearGradient>
	</defs>
	<!-- neon pill -->
	<rect x="2" y="2" width="416" height="60" rx="14" fill="url(#fill)" stroke="#00f0ff" stroke-width="2"/>
	<rect x="6" y="6" width="408" height="52" rx="11" fill="none" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.25"/>
	<!-- play glyph -->
	<circle cx="40" cy="32" r="16" fill="none" stroke="#ff2a6d" stroke-width="2"/>
	<path d="M35 24 L52 32 L35 40 Z" fill="#ff2a6d"/>
	<!-- label -->
	<text x="74" y="28" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" letter-spacing="1.5" fill="#00f0ff">LAUNCH THE LIVE DEMO</text>
	<text x="74" y="47" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="12" letter-spacing="0.5" fill="#9fb4c9">Web&#160;UI&#160;in&#160;your&#160;browser&#160;&#183;&#160;no&#160;hardware&#160;needed</text>
</svg>
