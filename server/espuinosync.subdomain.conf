## Version 2026/06/20
# Configuration for the espuinosync subdomain serving /mnt/user/espuino
#
# Credentials for access (basic auth): create with
#   htpasswd -c /config/nginx/.htpasswd_espuinosync <username>
#
# Layout (each endpoint self-contained in its own folder, browsable at /):
#   /espuino/
#     sd/      manifest.php  + <audio files>      -> syncUrl    https://host/sd/manifest.php
#     rfid/    rfid.php      + rfid_master.json    -> rfidUrl    https://host/rfid/rfid.php
#     backup/  backup.php    + backups/<host>/...  -> backupUrl  https://host/backup/backup.php
#
# The ESPuino derives the audio download base URL from the manifest URL's directory, so audio is
# fetched from /sd/<path> (a real subdir of the web root) — no rewrites needed. Standard PHP vhost.

server {
    listen 80;
    listen [::]:80;
    listen 443 ssl http2;
    listen [::]:443 ssl http2;

    server_name espuinosync.locn.de espuinosync.*;

    include /config/nginx/ssl.conf;

    client_max_body_size 0;

    root /espuino;

    access_log /config/log/nginx/espuinosync.access.log;

    auth_basic "Restricted";
    auth_basic_user_file /config/nginx/.htpasswd_espuinosync;

    location ~ \.php$ {
        include /etc/nginx/fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass 127.0.0.1:9000;
    }

    location / {
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        charset utf-8;
        try_files $uri $uri/ =404;
    }
}
